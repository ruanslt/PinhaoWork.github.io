<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <link rel="apple-touch-icon" href="/nu.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Valor da transferência</title>
  <style>
    :root {
      --nu-purple: #8A05BE;
      --nu-purple-dark: #6A0090;
      --nu-purple-light: #F2E5FA;
      --text-dark: #1A1A1A;
      --text-gray: #6B6B6B;
      --border-light: #EDEDED;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #EDE7F2;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      background: #F7F4FA;
      display: flex;
      flex-direction: column;
    }

    /* Top bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: calc(18px + env(safe-area-inset-top, 0px)) 20px 8px 20px;
    }

    .icon-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-dark);
      flex-shrink: 0;
    }

    .icon-btn svg {
      width: 24px;
      height: 24px;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .topbar-right .icon-btn svg {
      stroke: var(--nu-purple);
      color: var(--nu-purple);
    }

    /* Content */
    .content {
      flex: 1;
      padding: 12px 24px 24px 24px;
    }

    .title {
      font-size: clamp(24px, 7vw, 28px);
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.25;
      margin-bottom: 14px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-gray);
      line-height: 1.4;
      margin-bottom: 40px;
    }

    .subtitle b {
      color: var(--text-gray);
      font-weight: 600;
    }

    .amount-wrap {
      display: flex;
      align-items: baseline;
      gap: 6px;
      border-bottom: 2px solid var(--nu-purple);
      padding-bottom: 14px;
      position: relative;
    }

    .amount-value {
      font-size: clamp(36px, 11vw, 44px);
      font-weight: 700;
      color: var(--text-dark);
      letter-spacing: -0.5px;
      white-space: nowrap;
      overflow: hidden;
    }

    .cursor-dot {
      width: 14px;
      height: 14px;
      border-radius: 50% 50% 50% 0;
      background: var(--nu-purple);
      transform: rotate(45deg);
      margin-left: 4px;
      flex-shrink: 0;
    }

    .amount-input {
      position: absolute;
      inset: 0;
      opacity: 0;
      border: none;
      width: 100%;
      height: 100%;
    }

    /* Keypad */
    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      background: #fff;
      border-top: 1px solid var(--border-light);
    }

    .key {
      background: #fff;
      border: none;
      border-right: 1px solid var(--border-light);
      border-bottom: 1px solid var(--border-light);
      font-size: 24px;
      font-weight: 500;
      color: var(--text-dark);
      padding: 18px 0;
      cursor: pointer;
      transition: background .1s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .key:nth-child(3n) {
      border-right: none;
    }

    .key:active {
      background: var(--nu-purple-light);
    }

    .key.backspace svg {
      width: 22px;
      height: 22px;
      stroke: var(--text-dark);
      fill: none;
      stroke-width: 1.7;
    }

    .footer {
      padding: 16px 20px calc(16px + env(safe-area-inset-bottom, 0px)) 20px;
      background: #fff;
    }

    .continue-btn {
      width: 100%;
      background: #D9D9D9;
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 16px 0;
      font-size: 16px;
      font-weight: 700;
      cursor: not-allowed;
      transition: background .15s ease;
    }

    .continue-btn.active {
      background: var(--nu-purple);
      cursor: pointer;
    }

    @media (max-width: 360px) {
      .content { padding: 10px 18px 18px 18px; }
      .key { padding: 15px 0; font-size: 21px; }
    }
  </style>
</head>

<body>

  <div class="app">
    <div class="topbar">
      <button class="icon-btn" aria-label="Fechar" onclick="window.location.href='index.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
      <div class="topbar-right">
        <button class="icon-btn" aria-label="Idioma">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="12" r="9" />
            <path d="M2 12h18M11 3c2.5 2.5 3.8 5.7 3.8 9s-1.3 6.5-3.8 9c-2.5-2.5-3.8-5.7-3.8-9s1.3-6.5 3.8-9z" />
            <path d="M17 5l4 4M21 5v4h-4" />
          </svg>
        </button>
        <button class="icon-btn" aria-label="Menu">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <rect x="3" y="3" width="7" height="7" rx="1.5" />
            <rect x="14" y="3" width="7" height="7" rx="1.5" />
            <rect x="3" y="14" width="7" height="7" rx="1.5" />
            <rect x="14" y="14" width="7" height="7" rx="1.5" />
          </svg>
        </button>
      </div>
    </div>

    <div class="content">
      <div class="recipient-tag" id="recipientTag" style="display:none; font-size:13px; font-weight:600; color: var(--nu-purple); margin-bottom:8px;"></div>
      <div class="title">Qual é o valor da transferência?</div>
      <div class="subtitle">Saldo disponível em conta <b>R$ 211.356,98</b></div>

      <div class="amount-wrap">
        <div class="amount-value" id="amountDisplay">R$ 0,00</div>
        <div class="cursor-dot"></div>
        <input class="amount-input" id="amountInput" inputmode="none" readonly>
      </div>
    </div>

    <div class="keypad" id="keypad">
      <button class="key" data-key="1">1</button>
      <button class="key" data-key="2">2</button>
      <button class="key" data-key="3">3</button>
      <button class="key" data-key="4">4</button>
      <button class="key" data-key="5">5</button>
      <button class="key" data-key="6">6</button>
      <button class="key" data-key="7">7</button>
      <button class="key" data-key="8">8</button>
      <button class="key" data-key="9">9</button>
      <button class="key" data-key="00">00</button>
      <button class="key" data-key="0">0</button>
      <button class="key backspace" data-key="back">
        <svg viewBox="0 0 24 24"><path d="M9 6l-6 6 6 6M3 12h18a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2H9" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <div class="footer">
      <button class="continue-btn" id="continueBtn">Continuar</button>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const chave = urlParams.get('chave');
    if (chave) {
      const tag = document.getElementById('recipientTag');
      tag.textContent = 'Para: ' + chave;
      tag.style.display = 'block';
    }

    let cents = 0;
    const display = document.getElementById('amountDisplay');
    const btn = document.getElementById('continueBtn');

    function format(c) {
      const value = (c / 100).toFixed(2).replace('.', ',');
      const parts = value.split(',');
      parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.');
      return 'R$ ' + parts.join(',');
    }

    function render() {
      display.textContent = format(cents);
      if (cents > 0) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
    }

    document.getElementById('keypad').addEventListener('click', (e) => {
      const key = e.target.closest('.key');
      if (!key) return;
      const val = key.dataset.key;
      if (val === 'back') {
        cents = Math.floor(cents / 10);
      } else if (val === '00') {
        if (cents > 0 || cents === 0) cents = cents * 100;
        cents = Math.min(cents, 999999999);
      } else {
        cents = cents * 10 + parseInt(val, 10);
        cents = Math.min(cents, 999999999);
      }
      render();
    });

    btn.addEventListener('click', () => {
      if (cents <= 0) return;
      const valorFormatado = format(cents);
      window.location.href = 'transferir-destinatario.html?valor=' + encodeURIComponent(valorFormatado);
    });

    render();
  </script>

</body>
</html>
