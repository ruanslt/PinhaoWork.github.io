<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Área Pix</title>
<style>
  :root {
    --purple: #820AD1;
    --text-dark: #1A1A1A;
    --text-gray: #6B6B6B;
    --icon-bg: #F1F1F3;
    --divider: #EDEDED;
    --chevron: #B0B0B0;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #FFFFFF;
    color: var(--text-dark);
    display: flex;
    justify-content: center;
  }

  .screen {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    padding: 24px 24px 40px;
  }

  /* Top bar */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
  }

  .icon-btn {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-dark);
  }

  .icon-btn svg {
    width: 24px;
    height: 24px;
  }

  /* Header */
  .header h1 {
    font-size: clamp(28px, 8vw, 34px);
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 16px;
  }

  .header p {
    font-size: 16px;
    line-height: 1.5;
    color: var(--text-gray);
    max-width: 90%;
  }

  /* Section titles */
  .section-title {
    font-size: 22px;
    font-weight: 700;
    margin: 32px 0 20px;
  }

  /* Action grid */
  .action-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  .action-grid.two-col {
    grid-template-columns: repeat(2, 1fr);
    max-width: 66%;
  }

  .action-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 10px;
    cursor: pointer;
    background: none;
    border: none;
    font-family: inherit;
    padding: 4px;
    border-radius: 12px;
  }

  .action-item:focus-visible {
    outline: 2px solid var(--purple);
    outline-offset: 3px;
  }

  .action-item:active .icon-circle {
    background: #E4E4E7;
  }

  .icon-circle {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--icon-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease;
  }

  .icon-circle svg {
    width: 26px;
    height: 26px;
    stroke: var(--text-dark);
  }

  .action-item span {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.2;
  }

  /* Divider */
  .divider {
    height: 1px;
    background: var(--divider);
    margin: 32px 0;
    border: none;
  }

  /* List rows */
  .list-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    padding: 18px 0;
    cursor: pointer;
    background: none;
    border: none;
    width: 100%;
    text-align: left;
    font-family: inherit;
    border-top: 1px solid var(--divider);
  }

  .list-row:first-of-type {
    border-top: none;
    padding-top: 0;
  }

  .list-row:focus-visible {
    outline: 2px solid var(--purple);
    outline-offset: 2px;
    border-radius: 8px;
  }

  .list-row-text h3 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .list-row-text p {
    font-size: 14px;
    color: var(--text-gray);
    line-height: 1.4;
  }

  .chevron {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    stroke: var(--chevron);
    margin-top: 4px;
  }

  /* Responsiveness */
  @media (max-width: 380px) {
    .screen {
      padding: 20px 18px 32px;
    }
    .icon-circle {
      width: 56px;
      height: 56px;
    }
    .icon-circle svg {
      width: 22px;
      height: 22px;
    }
    .action-item span {
      font-size: 13px;
    }
    .section-title {
      font-size: 20px;
    }
  }

  @media (min-width: 600px) {
    .screen {
      padding: 32px 40px 48px;
      border: 1px solid var(--divider);
      border-radius: 20px;
      margin: 24px 0;
      box-shadow: 0 4px 24px rgba(0,0,0,0.05);
    }
  }
</style>
</head>
<body>

<div class="screen">

  <!-- Top bar -->
<div class="topbar">
  <button class="icon-btn" aria-label="Fechar" onclick="window.location.href='index.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="18" y1="6" x2="6" y2="18"/>
      <line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>

  <button class="icon-btn" aria-label="Ajuda">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
      <line x1="12" y1="17" x2="12.01" y2="17"/>
    </svg>
  </button>
</div>
  <!-- Header -->
  <header class="header">
    <h1>Área Pix</h1>
    <p>Envie e receba pagamentos a qualquer hora e dia da semana, sem pagar nada por isso.</p>
  </header>

  <!-- Enviar -->
  <h2 class="section-title">Enviar</h2>
  <div class="action-grid">
  <button class="action-item" onclick="window.location.href='transferir-destinatario.html'">
  <span class="icon-circle">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="6" width="16" height="12" rx="2"/>
      <path d="M18 10l4-2v8l-4-2"/>
      <path d="M8 12h4"/>
      <path d="M10 9l3 3-3 3"/>
    </svg>
  </span>
  <span>Transferir</span>
</button>
    <button class="action-item">
      <span class="icon-circle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="8" y="8" width="12" height="12" rx="2"/>
          <path d="M4 16V4a2 2 0 0 1 2-2h10"/>
        </svg>
      </span>
      <span>Pix Copia e Cola</span>
    </button>
    <button class="action-item">
      <span class="icon-circle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <line x1="17" y1="14" x2="17" y2="14.01"/>
          <line x1="21" y1="18" x2="21" y2="18.01"/>
          <line x1="17" y1="21" x2="17" y2="21.01"/>
          <line x1="14" y1="18" x2="14" y2="18.01"/>
          <line x1="21" y1="14" x2="21" y2="14.01"/>
        </svg>
      </span>
      <span>Ler QR code</span>
    </button>
  </div>

  <!-- Receber -->
  <h2 class="section-title">Receber</h2>
  <div class="action-grid two-col">
    <button class="action-item">
      <span class="icon-circle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 12a8 8 0 1 1-3-6.2"/>
          <path d="M20 4v5h-5"/>
          <line x1="12" y1="8" x2="12" y2="16"/>
          <line x1="9" y1="11" x2="15" y2="11"/>
        </svg>
      </span>
      <span>Cobrar</span>
    </button>
    <button class="action-item">
      <span class="icon-circle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="6" width="16" height="12" rx="2"/>
          <path d="M18 10l4-2v8l-4-2"/>
          <path d="M6 15l3-3 3 3"/>
          <line x1="9" y1="9" x2="9" y2="12"/>
        </svg>
      </span>
      <span>Depositar</span>
    </button>
  </div>

  <hr class="divider">

  <!-- List rows -->
  <button class="list-row">
    <div class="list-row-text">
      <h3>Registrar ou trazer chaves</h3>
      <p>Registre uma nova chave ou faça a portabilidade para o Nubank.</p>
    </div>
    <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
  </button>

  <button class="list-row">
    <div class="list-row-text">
      <h3>Configurar Pix</h3>
      <p>Gerencie seu limite diário de transferências ou suas chaves Pix.</p>
    </div>
    <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
  </button>

</div>

</body>
</html>
